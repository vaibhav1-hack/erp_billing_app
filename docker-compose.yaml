version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: billing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: billing_erp
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d billing_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: billing_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/billing_erp
      JWT_SECRET: erp_1st_app
    depends_on:
      db:
        condition: service_healthy
    ports: 
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: billing_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data: